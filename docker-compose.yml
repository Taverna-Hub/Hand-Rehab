version: "3.9"

services:
  node-red:
    build:
      context: ./applications/node-red
      dockerfile: Dockerfile
    container_name: handrehab-node-red
    restart: unless-stopped
    ports:
      - "1880:1880"
      - "1883:1883"
    environment:
      MQTT_PORT: "1883"
      NODE_RED_MQTT_BROKER: "127.0.0.1"
      NODE_RED_CLIENT_ID: node-red-hand-rehab
    volumes:
      - nodered_data:/data

volumes:
  nodered_data:
